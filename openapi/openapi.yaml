openapi: 3.0.1
info:
  title: Agent Tracker Service API
  version: v1
  description: Task-first REST surface with idempotent command semantics
paths:
  /v1/tasks:
    get:
      summary: List tasks
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
        - in: query
          name: cursor
          required: false
          description: Offset cursor token. Supports plain `<n>` or compatibility token `o:<n>`.
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      type: object
                  nextCursor:
                    type: string
                    nullable: true
    post:
      summary: Create task
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task created
        "409":
          description: Domain conflict
          content:
            application/json:
              examples:
                concurrentModification:
                  value:
                    code: CONCURRENT_MODIFICATION
                    status: 409
                idempotencyKeyReuseMismatch:
                  value:
                    code: IDEMPOTENCY_KEY_REUSE_MISMATCH
                    status: 409
  /v1/tasks/{taskId}:
    get:
      summary: Get task by id
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task found
        "404":
          description: Task missing
  /v1/tasks/{taskId}/status:
    patch:
      summary: Update task status
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task updated
        "409":
          description: Domain conflict
