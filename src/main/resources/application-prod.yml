task:
  store: mongo

mongodb:
  uri: ${MONGODB_URI}
  database: ${MONGODB_DATABASE:agent_tracker}

idempotency:
  ttl-hours: ${IDEMPOTENCY_TTL_HOURS:48}

micronaut:
  server:
    endpoints:
      all:
        enabled: false
        sensitive: true
  mcp:
    server:
      transport: ${MCP_TRANSPORT:HTTP}
