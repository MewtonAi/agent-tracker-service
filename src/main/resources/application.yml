micronaut:
  application:
    name: agent-tracker-service
  metrics:
    enabled: true
    export:
      prometheus:
        enabled: true
  server:
    endpoints:
      all:
        enabled: true
        sensitive: false
  mcp:
    server:
      info:
        name: mcpdemo
        version: 0.0.1
      transport: HTTP
mongodb:
  uri: ${MONGODB_URI:`mongodb://localhost:27017/agent_tracker`}
  database: ${MONGODB_DATABASE:agent_tracker}

idempotency:
  ttl-hours: ${IDEMPOTENCY_TTL_HOURS:48}
